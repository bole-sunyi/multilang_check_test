# ==========================================================
# stamp_test 模块业务流配置文件
# ----------------------------------------------------------
# 这份文件目前是按项目现有有效流程完整复制出来的模板版本。
# 如果后面你采到了 stamp 模块自己的真实坐标，只需要改 steps 里的坐标即可。
# ==========================================================

# 1. 基础配置区
package_name_env: "APP_PACKAGE_NAME"
startup_wait_seconds: 20              # 启动游戏后额外等待 20 秒，避免资源还没加载完就开始点击
stop_app_after_run: false             # 跑完后先不关 App，方便你肉眼确认页面状态
dump_poco_tree: true                  # 每次执行都导出 Poco 控件树，方便排查“为什么点不到”
excel_sheet_name: "stamp"             # 本模块截图写入本地表格的 stamp sheet

# Poco selector 配置模板：
# - action: "click"
#   selector:
#     text: "按钮文字"                  # 或 resourceId / resource_id / desc / name / type
#     index: 0                         # 多个节点同时命中时可指定第几个
#   relative_pos: [0.5, 0.5]           # 可选：点击控件内部的相对位置
#   fallback_pos: [0.5, 0.5]           # 仅当 Poco 节点树完全识别不到时临时兜底

# 2. 业务步骤区
steps:
  # 目的：
  # 1. 等主界面完全稳定下来；
  # 2. 给动画、资源加载、可能的入口刷新留缓冲时间；
  # 3. 如果后续第一步点击总是没效果，优先怀疑这里需要多等几秒。
  - name: "【准备】等待主界面完全加载"
    action: "sleep"
    seconds: 10                       # 额外多等 10 秒，确保主界面动画和资源都稳定下来

  # 目的：
  # 1. 在开始点击前先截一张“起跑线截图”；
  # 2. 这样后面出问题时，能快速判断是不是一开始页面就不对；
  # 3. 这张图也是最适合给别人看问题的第一张证据图。
  - name: "【留证】点击前先截图"
    action: "snapshot"
    message: "stamp_test 模块开始点击前的界面记录"

  # 目的：
  # 1. 从主界面点进 stamp 所在的总入口；
  # 2. 这是整个 stamp 链路的第一跳；
  # 3. 点完后，预期应该跳进 stamp 相关页面，而不是继续停留在原主界面。
  - name: "【操作】点击底部入口按钮"
    action: "click"
    # 说明：
    # 1. 这里优先沿用项目里已经验证过的一组坐标；
    # 2. 如果 Poco 识别不到游戏贴图按钮，就使用 fallback_pos 做坐标点击；
    # 3. 坐标是百分比坐标，范围 0 到 1。
    fallback_pos: [0.082, 0.383]
    sleep_after: 1                    # 第 1 步点击后等待 1 秒，再截图，便于观察界面反馈
    snapshot_after: true

  # 目的：
  # 1. 给入口点击后的界面状态补一张截图；
  # 2. 这张图主要用来确认“有没有真的进入 stamp 页面”；
  # 3. 如果后面步骤都不对，通常先回看这里。
  - name: "【留证】点击入口后的页面截图"
    action: "snapshot"
    message: "stamp_test 模块入口点击后的页面状态"

  # 目的：
  # 1. 在 stamp 入口页里继续进入第 1 个业务入口；
  # 2. 这一步通常会把页面从模块首页推进到子页面或弹窗页；
  # 3. 点完后，预期页面内容有明显变化。
  - name: "【操作】进入原始模板里的第 1 个业务入口"
    action: "click"
    fallback_pos: [0.0755, 0.3818]
    sleep_after: 1                    # 第 2 步点击后等待 1 秒，再截图，便于观察界面反馈
    snapshot_after: true

  # 目的：
  # 1. 在第 1 个子页面里继续进入更深一层业务入口；
  # 2. 这是验证 stamp 流程是否能继续推进的关键一步；
  # 3. 点完后，预期出现新的内容页、奖励页或下一层弹窗。
  - name: "【操作】进入原始模板里的第 2 个业务入口"
    action: "click"
    fallback_pos: [0.237, 0.4971]
    sleep_after: 1                    # 第 3 步点击后等待 1 秒，再截图，便于观察界面反馈
    snapshot_after: true

  # 目的：
  # 1. 关闭当前子页面或弹层；
  # 2. 这一步用于验证 stamp 业务流能正常收尾回退；
  # 3. 点完后，预期返回上一层页面，而不是留在打不开的新界面里。
  - name: "【操作】执行原始模板里的关闭动作"
    action: "click"
    fallback_pos: [0.9531, 0.9727]
    sleep_after: 1                    # 第 4 步点击后等待 1 秒，再截图，便于观察界面反馈
    snapshot_after: true
