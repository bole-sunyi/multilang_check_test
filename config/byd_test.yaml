# ==========================================================
# byd_test 模块业务流配置文件
# ----------------------------------------------------------
# 这份文件只使用 Poco selector 执行点击。
# 当前点击步骤需要先补齐 selector 后再执行完整业务流。
# ==========================================================

# 1. 基础配置区
package_name_env: "APP_PACKAGE_NAME"
startup_wait_seconds: 20              # 启动游戏后额外等待 20 秒，避免资源还没加载完就开始点击
stop_app_after_run: false             # 跑完后先不关 App，方便你肉眼确认页面状态
dump_poco_tree: true                  # 每次执行都导出 Poco 控件树，方便排查“为什么点不到”
excel_sheet_name: "byd"               # 未开启钉钉导出时，才会写入本地 Excel 的 byd sheet
dingtalk_export:
  enabled: true                       # 方案 2（Cursor MCP版）：模块执行后生成待同步 JSON，不再生成本地 Excel
  workbook_id: "https://alidocs.dingtalk.com/i/nodes/dpYLaezmVNLd17qQSPXQzPAq8rMqPxX6?utm_scene=team_space"
  sheet_id: "kgqie6hm"

# Poco selector 配置模板：
# - action: "click"
#   selector:
#     name: "footer"                   # 游戏节点名，优先从 Poco 节点树里复制
#     chain:                           # 可选：继续按 child/offspring 链路定位
#       - method: "child"
#         name: "screentouch_node"
#       - method: "child"
#         name: "spin_bg"
#     index: 0                         # 多个节点同时命中时可指定第几个
#   relative_pos: [0.5, 0.5]           # 可选：点击控件内部的相对位置

# 2. 业务步骤区
steps:
  # 目的：
  # 1. 给游戏主界面预留稳定时间；
  # 2. 避免资源还没加载完，就直接去点底部入口；
  # 3. 如果后面第一步点击经常没有反应，优先考虑这里需要再加等待。
  - name: "【准备】等待主界面完全加载"
    action: "sleep"
    seconds: 10                       # 额外多等 10 秒，确保主界面动画和资源都稳定下来

  # 目的：
  # 1. 在真正开始点击前先留一张现场图；
  # 2. 这张图最适合用来判断脚本起点是不是你想要的主界面；
  # 3. 如果后面点偏了，先回头看这张图最省时间。
  - name: "【留证】点击前先截图"
    action: "snapshot"
    message: "byd_test 模块开始点击前的界面记录"

  # 目的：
  # 1. 先从主界面点进 byd 所在的大入口区域；
  # 2. 这是后续进入 byd 模块的第一跳；
  # 3. 点完后，预期应该切到弹窗、活动页或模块入口页。
  - name: "【操作】点击底部入口按钮"
    action: "snapshot"
    message: "待补 Poco selector：点击底部入口按钮"

  # 目的：
  # 1. 把进入入口后的界面状态单独留证；
  # 2. 这张图主要用于判断“第一跳是不是进对了页面”；
  # 3. 如果这一步截图还像主界面，通常说明上一步没点中。
  - name: "【留证】点击入口后的页面截图"
    action: "snapshot"
    message: "byd_test 模块入口点击后的页面状态"

  # 目的：
  # 1. 在 byd 对应页面里继续点击第 1 个业务入口；
  # 2. 这一步通常代表从模块首页进入更具体的业务子页；
  # 3. 点完后，预期应该看到新的业务内容，而不是原页面没有变化。
  - name: "【操作】进入原始模板里的第 1 个业务入口"
    action: "snapshot"
    message: "待补 Poco selector：进入原始模板里的第 1 个业务入口"

  # 目的：
  # 1. 在上一步子页里继续进入第 2 层业务入口；
  # 2. 这是验证 byd 流程能否继续往深层走的重要一步；
  # 3. 点完后，预期出现更深一层页面、弹窗或奖励详情页。
  - name: "【操作】进入原始模板里的第 2 个业务入口"
    action: "snapshot"
    message: "待补 Poco selector：进入原始模板里的第 2 个业务入口"

  # 目的：
  # 1. 对当前弹层或子页面执行关闭动作；
  # 2. 这一步用于验证“能进，也能正常退”；
  # 3. 点完后，预期回到上一层 byd 页面或主入口页，而不是卡死在弹窗里。
  - name: "【操作】执行原始模板里的关闭动作"
    action: "snapshot"
    message: "待补 Poco selector：执行原始模板里的关闭动作"
