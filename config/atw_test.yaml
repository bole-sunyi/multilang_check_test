# ==========================================================
# atw_test 模块业务流配置文件
# ----------------------------------------------------------
# 这份文件只使用 Poco selector 执行点击。
# 新增步骤时，优先从 dump_current_screen.py 生成的 nodes_steps.yaml 复制 name + chain。
# ==========================================================

# 1. 基础配置区
package_name_env: "APP_PACKAGE_NAME"
startup_wait_seconds: 3               # 启动游戏后额外等待 3 秒，避免资源还没加载完就开始点击
stop_app_after_run: false             # 跑完后先不关 App，方便你肉眼确认页面状态
dump_poco_tree: true                  # 每次执行都导出 Poco 控件树，方便排查“为什么点不到”
excel_sheet_name: "atw"               # 未开启钉钉导出时，才会写入本地 Excel 的 atw sheet
dingtalk_export:
  enabled: true                       # 方案 2（Cursor MCP版）：模块执行后生成待同步 JSON，不再生成本地 Excel
  workbook_id: "https://alidocs.dingtalk.com/i/nodes/dpYLaezmVNLd17qQSPXQzPAq8rMqPxX6?utm_scene=team_space"
  sheet_id: "kgqie6hm"

# Poco selector 配置模板：
# - action: "click"
#   selector:
#     name: "footer"                   # 游戏节点名，优先从 Poco 节点树里复制
#     chain:                           # 可选：继续按 child/offspring 链路定位
#       - method: "child"
#         name: "screentouch_node"
#       - method: "child"
#         name: "spin_bg"
#     index: 0                         # 多个节点同时命中时可指定第几个
#   relative_pos: [0.5, 0.5]           # 可选：点击控件内部的相对位置

# 2. 业务步骤区
steps:
  # 目的：
  # 1. 刚启动 App 后，主界面通常还有动画、资源加载、弹窗刷新；
  # 2. 这里先统一多等 3 秒，尽量把起跑线拉到稳定状态；
  # 3. 如果后面第一步就点偏，通常优先怀疑这里等得不够久。
  - name: "【准备】等待主界面完全加载"
    action: "sleep"
    seconds: 3                        # 额外多等 3 秒，确保主界面动画和资源都稳定下来
   

  - name: "【操作】点击COLLECTIONS入口"
    action: "snapshot"
    message: "atw_test 主界面状态，用于确认是否能看到 COLLECTIONS 入口"

  # 节点识别: a_set_node
  # 说明：这是底部 COLLECTIONS 入口的父级容器，已验证比 title_label 文本节点更适合点击。
  - name: "【操作】点击COLLECTIONS入口"
    action: "click"
    selector:
      name: "Lobby_Footer_Node"
      chain:
        - method: "child"
          name: "footer"
        - method: "child"
          name: "middle_node"
        - method: "child"
          name: "a_set_node"
    sleep_after: 0.5
    snapshot_after: false



  # 节点识别: timer_label
  # 显示文本: 83D 15H
  # 来源: selector_failure/05_【操作】点击level_item/nodes_steps.yaml
  - name: "【操作】点击ATW入口"
    action: click
    selector:
      name: Lobby_Footer_Node
      chain:
        - method: child
          name: footer
        - method: child
          name: middle_node
        - method: child
          name: a_set_node
        - method: child
          name: unlock_node
        - method: child
          name: tip_node
        - method: child
          name: bubble_node
        - method: child
          name: atw_node
        - method: child
          name: unlock_node
        - method: child
          name: timer_node
        - method: child
          name: timer_label
    sleep_after: 1
    snapshot_after: true