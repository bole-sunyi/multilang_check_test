# ==========================================================
# atw_test 模块业务流配置文件
# ----------------------------------------------------------
# 这份文件只使用 Poco selector 执行点击。
# 新增步骤时，优先从 dump_current_screen.py 生成的 nodes_steps.yaml 复制 name + chain。
# ==========================================================

# 1. 基础配置区
package_name_env: "APP_PACKAGE_NAME"
startup_wait_seconds: 3               # 启动游戏后额外等待 3 秒，避免资源还没加载完就开始点击
stop_app_after_run: false             # 跑完后先不关 App，方便你肉眼确认页面状态
dump_poco_tree: true                  # 每次执行都导出 Poco 控件树，方便排查“为什么点不到”
excel_sheet_name: "atw"               # 未开启钉钉导出时，才会写入本地 Excel 的 atw sheet
dingtalk_export:
  enabled: true                       # 方案 2（Cursor MCP版）：模块执行后生成待同步 JSON，不再生成本地 Excel
  workbook_id: "https://alidocs.dingtalk.com/i/nodes/dpYLaezmVNLd17qQSPXQzPAq8rMqPxX6?utm_scene=team_space"
  sheet_id: "kgqie6hm"

# Poco selector 配置模板：
# - action: "click"
#   selector:
#     name: "footer"                   # 游戏节点名，优先从 Poco 节点树里复制
#     chain:                           # 可选：继续按 child/offspring 链路定位
#       - method: "child"
#         name: "screentouch_node"
#       - method: "child"
#         name: "spin_bg"
#     index: 0                         # 多个节点同时命中时可指定第几个
#   relative_pos: [0.5, 0.5]           # 可选：点击控件内部的相对位置

# 2. 业务步骤区
steps:
  # 目的：
  # 1. 刚启动 App 后，主界面通常还有动画、资源加载、弹窗刷新；
  # 2. 这里先统一多等 3 秒，尽量把起跑线拉到稳定状态；
  # 3. 如果后面第一步就点偏，通常优先怀疑这里等得不够久。
  - name: "【准备】等待主界面完全加载"
    action: "sleep"
    seconds: 3                       # 额外多等 3 秒，确保主界面动画和资源都稳定下来
  # 节点识别: Piñata
  # 显示文本: Piñata
  # 描述信息: <Label | Tag = -1, Label = >Piñata
  # Poco中心点: [0.2289, 0.6346]
  # Poco大小: [0.074, 0.0333]
  # Poco路径: root/1:<Node | Tag = -1/1:level_dialog/0:root/2:item_list_node/0:<Layer | Tag = -1>/0:<Layer | Tag = -1>/0:<Node | Tag = -1/0:<Node | Tag = -1/0:level_item/0:root/6:current_label
  # 复制建议: 优先复制下面从 '- name:' 开始的整个步骤到 config/*.yaml 的 steps 下。
  - name: 【操作】点击Piñata
    action: click
    selector:
      name: level_dialog
      chain:
        - method: child
          name: root
        - method: child
          name: item_list_node
        - method: offspring
          name: level_item
        - method: child
          name: root
        - method: child
          name: current_label
      index: 0
    sleep_after: 1
    snapshot_after: true